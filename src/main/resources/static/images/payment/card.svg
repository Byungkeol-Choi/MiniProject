<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" rx="14" fill="#EFF6FF"/>
  <!-- Card body -->
  <rect x="9" y="19" width="62" height="42" rx="7" fill="#3B82F6"/>
  <!-- Magnetic stripe -->
  <rect x="9" y="30" width="62" height="11" fill="#1D4ED8"/>
  <!-- Chip -->
  <rect x="16" y="22" width="14" height="10" rx="2" fill="#FBBF24"/>
  <line x1="20" y1="22" x2="20" y2="32" stroke="#D97706" stroke-width="1"/>
  <line x1="24" y1="22" x2="24" y2="32" stroke="#D97706" stroke-width="1"/>
  <line x1="16" y1="27" x2="30" y2="27" stroke="#D97706" stroke-width="1"/>
  <!-- Card number dots -->
  <rect x="16" y="47" width="22" height="6" rx="3" fill="white" opacity="0.55"/>
  <rect x="44" y="47" width="16" height="6" rx="3" fill="white" opacity="0.35"/>
</svg>
