<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" rx="14" fill="#F0FDF4"/>
  <!-- Bill body -->
  <rect x="7" y="22" width="66" height="36" rx="6" fill="#22C55E"/>
  <!-- Bill inner frame -->
  <rect x="12" y="27" width="56" height="26" rx="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <!-- Center circle -->
  <circle cx="40" cy="40" r="10" fill="#15803D"/>
  <!-- Won sign -->
  <text x="40" y="45.5" text-anchor="middle"
        font-size="13" font-weight="900"
        fill="white"
        font-family="Arial, sans-serif">©</text>
  <!-- Corner decoration circles -->
  <circle cx="18" cy="31" r="5" fill="#16A34A" opacity="0.55"/>
  <circle cx="62" cy="49" r="5" fill="#16A34A" opacity="0.55"/>
</svg>
