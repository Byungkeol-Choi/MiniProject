# ===== Application =====
spring:
  application:
    name: cafe-kiosk

  # ===== Supabase (PostgreSQL) Datasource =====
  # Supabase 프로젝트 설정에서 확인: Settings > Database > Connection string (JDBC)
  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres
    username: postgres.vovecvmrluxxwiaeayij
    password: 'kosmo123!@#'
    driver-class-name: org.postgresql.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===== Thymeleaf =====
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML

  # ===== Security =====
  # 관리자 기본 계정 (SecurityConfig에서 재정의 권장)
  security:
    user:
      name: admin
      password: admin1234

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
