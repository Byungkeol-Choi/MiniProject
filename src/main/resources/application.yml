# ===== Application =====
spring:
  application:
    name: cafe-kiosk

  config:
    import: optional:classpath:application-secret.yml

  # ===== Supabase (PostgreSQL) Datasource =====
  # Supabase 프로젝트 설정에서 확인: Settings > Database > Connection string (JDBC)
  # username/password는 application-secret.yml 참고
  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
    driver-class-name: org.postgresql.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===== Thymeleaf =====
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML

  # ===== Security =====
  # 관리자 로그인: DB admin 테이블 + AdminUserDetailsService

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
