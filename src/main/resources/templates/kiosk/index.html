<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>브런치 카페 키오스크</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/kiosk.css}" />
  </head>
  <body>
    <!-- ===== 헤더 ===== -->
    <!--/*
  [백엔드 연동] 아래 th:replace를 사용하면 fragments/layout.html의 kiosk-header를 가져옵니다.
  <header th:replace="~{fragments/layout :: kiosk-header}"></header>
*/-->
    <header class="kiosk-header">
      <div class="cafe-branding">
        <div class="cafe-logo-circle">
          <img src="/images/logo.png" alt="브런치 카페 로고" />
        </div>
        <div class="cafe-name-block">
          <div class="name">버터벨</div>
          <div class="sub">BRUNCH & COFFEE</div>
        </div>
      </div>
      <div class="header-right">
        <span class="header-time" id="header-clock">
          <i class="bi bi-clock"></i> 00:00
        </span>
        <!--
    # 회원 로그인 생략
    <a th:href="@{/member/login}" href="/member/login" class="btn-member-login">
      <i class="bi bi-person-circle"></i>
      [백엔드 연동] 로그인 후 회원명 표시: th:text="${session.memberName ?: '회원 로그인'}"
      <span>회원 로그인</span>
    </a>
     -->
      </div>
    </header>
    <!-- ===== 메인 레이아웃 ===== -->
    <div class="kiosk-main">
      <!-- ─── 메뉴 섹션 ─────────────────────────────── -->
      <div class="menu-section">
        <!-- 탭 버튼 -->
        <div class="menu-tabs">
          <button
            class="tab-btn active"
            data-tab="food"
            id="tab-food"
            onclick="switchTab('food')"
          >
            음식 메뉴
          </button>
          <button
            class="tab-btn"
            data-tab="drink"
            id="tab-drink"
            onclick="switchTab('drink')"
          >
            음료 메뉴
          </button>
        </div>

        <!-- ─ 음식 메뉴 그리드 ─ -->
        <!--
      [백엔드 연동] Controller에서 model.addAttribute("foodMenus", menuService.findByCategory("FOOD")) 필요
      Menu 필드: id, name, price, description, imageUrl, available
    -->
        <div class="menu-grid-wrapper" data-tab="food">
          <div class="menu-grid">
            <!-- Thymeleaf 반복 렌더링 -->
            <div
              class="menu-card"
              th:each="menu : ${foodMenus}"
              th:classappend="${!menu.available} ? 'soldout'"
              th:data-id="${menu.id}"
              th:data-name="${menu.name}"
              th:data-price="${menu.price}"
              th:data-img="${menu.imageUrl ?: '/images/menu/eggs-benedict.png'}"
              th:data-available="${menu.available}"
              onclick="
                if (this.dataset.available === 'true')
                  Cart.add(
                    this.dataset.id,
                    this.dataset.name,
                    this.dataset.price,
                    this.dataset.img,
                  );
              "
            >
              <div class="menu-card-img-wrap">
                <img
                  th:src="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl) ? menu.imageUrl : '/images/menu/empty.png'}"
                  th:alt="${menu.name}"
                  class="menu-card-img"
                />
              </div>
              <div class="menu-card-body">
                <div class="menu-card-name" th:text="${menu.name}">
                  에그 베네딕트
                </div>
                <div class="menu-card-desc" th:text="${menu.description}">
                  홀란다이즈 소스와 수란이 올라간 브런치의 정석
                </div>
                <div class="menu-card-footer">
                  <span
                    class="menu-card-price"
                    th:text="${#numbers.formatInteger(menu.price,1,'COMMA') + '원'}"
                    >16,500원</span
                  >
                  <button
                    th:if="${menu.available}"
                    class="btn-add-cart"
                    onclick="
                      event.stopPropagation();
                      const food = this.closest('.menu-card');
                      Cart.add(
                        food.dataset.id,
                        food.dataset.name,
                        food.dataset.price,
                        food.dataset.img,
                      );
                    "
                  >
                    +
                  </button>
                  <span th:unless="${menu.available}" class="soldout-badge"
                    >품절</span
                  >
                </div>
              </div>
              <div th:unless="${menu.available}" class="soldout-overlay">
                <span class="soldout-badge">품절</span>
              </div>
            </div>

          </div>
        </div>
        <!-- ─ 음료 메뉴 그리드 ─ -->
        <!--
      [백엔드 연동] Controller에서 model.addAttribute("drinkMenus", menuService.findByCategory("DRINK")) 필요
    -->
        <div class="menu-grid-wrapper" data-tab="drink" style="display: none">
          <div class="menu-grid">
            <div
              class="menu-card"
              th:each="menu : ${drinkMenus}"
              th:classappend="${!menu.available} ? 'soldout'"
              th:data-id="${menu.id}"
              th:data-name="${menu.name}"
              th:data-price="${menu.price}"
              th:data-img="${menu.imageUrl ?: '/images/menu/hot-americano.png'}"
              th:data-available="${menu.available}"
              onclick="
                if (this.dataset.available === 'true')
                  Cart.add(
                    this.dataset.id,
                    this.dataset.name,
                    this.dataset.price,
                    this.dataset.img,
                  );
              "
            >
              <div class="menu-card-img-wrap">
                <img
                  th:src="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl) ? menu.imageUrl : '/images/menu/empty.png'}"
                  th:alt="${menu.name}"
                  class="menu-card-img"
                />
              </div>
              <div class="menu-card-body">
                <div class="menu-card-name" th:text="${menu.name}">
                  따뜻한 아메리카노
                </div>
                <div class="menu-card-desc" th:text="${menu.description}">
                  진하고 깔끔한 에스프레소 베이스 커피
                </div>
                <div class="menu-card-footer">
                  <span
                    class="menu-card-price"
                    th:text="${#numbers.formatInteger(menu.price,1,'COMMA') + '원'}"
                    >5,000원</span
                  >
                  <button
                    th:if="${menu.available}"
                    class="btn-add-cart"
                    onclick="
                      event.stopPropagation();
                      const drink = this.closest('.menu-card');
                      Cart.add(
                        drink.dataset.id,
                        drink.dataset.name,
                        drink.dataset.price,
                        drink.dataset.img,
                      );
                    "
                  >
                    +
                  </button>
                  <span th:unless="${menu.available}" class="soldout-badge"
                    >품절</span
                  >
                </div>
              </div>
              <div th:unless="${menu.available}" class="soldout-overlay">
                <span class="soldout-badge">품절</span>
              </div>
            </div>


          </div>
          <!-- /menu-grid -->
        </div>
        <!-- /menu-grid-wrapper drink -->

        <footer class="kiosk-page-footer">
          <a
            th:href="@{/admin/login}"
            href="/admin/login"
            class="kiosk-admin-link"
          >
            <i class="bi bi-person-gear"></i>관리자
          </a>
        </footer>
      </div>
      <!-- /menu-section -->

      <!-- ─── 장바구니 패널 ─────────────────────────── -->
      <div class="cart-section">
        <div class="cart-header">
          <div class="cart-title">
            <span><i class="bi bi-cart3"></i> 주문 목록</span>
            <span class="cart-count-badge" id="cart-count">0</span>
          </div>
          <!--
      [백엔드 연동] 로그인 회원 표시: th:if="${session.memberName != null}"
      <div class="cart-member-bar" id="cart-member-bar" style="display:none;">
        <i class="bi bi-person-check-fill"></i>
        <span id="cart-member-name">홍길동 고객님</span>
      </div>
       -->
        </div>

        <!-- 장바구니 아이템 목록 (JS 동적 렌더링) -->
        <div class="cart-items" id="cart-items"></div>

        <!-- 빈 장바구니 메시지 -->
        <div
          class="cart-empty"
          id="cart-empty"
          style="display: flex; flex-direction: column; align-items: center"
        >
          <i class="bi bi-cart-x"></i>
          <span>메뉴를 선택해주세요</span>
        </div>

        <!-- 하단 합계 및 버튼 -->
        <div class="cart-footer">
          <div class="cart-summary-row">
            <span>소계</span>
            <span class="val" id="cart-subtotal">0원</span>
          </div>

          <div class="cart-grand-total">
            <span class="cart-grand-label">합계</span>
            <span class="cart-grand-value" id="cart-total">0원</span>
          </div>

          <button
            class="btn-checkout"
            id="btn-checkout"
            disabled
            onclick="Cart.checkout()"
          >
            주문하기
          </button>
          <button
            class="btn-checkout-clear"
            id="btn-cart-clear"
            style="display: none"
            onclick="Cart.clear()"
          >
            비우기
          </button>
        </div>
      </div>
      <!-- /cart-section -->
    </div>
    <!-- /kiosk-main -->

    <!-- ===== 주문 폼 (장바구니 데이터 전송) ===== -->
    <!--
  [백엔드 연동]
  POST /order/cart 로 cartData(JSON 문자열)를 전송합니다.
  CartController에서 @RequestParam("cartData") String cartData 로 받아
  ObjectMapper로 파싱 후 세션에 저장하세요.
-->
    <form
      id="checkout-form"
      method="post"
      th:action="@{/order/cart}"
      action="/order/cart"
      style="display: none"
    >
      <input type="hidden" id="cart-data" name="cartData" />
      <!-- CSRF 토큰 (Spring Security) -->
      <input
        type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"
      />
    </form>

    <!-- 토스트 알림 -->
    <div class="toast-notification" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.js"></script>
    <script th:src="@{/js/kiosk.js}"></script>
  </body>
</html>
