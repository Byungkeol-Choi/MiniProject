<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포인트 적립 - 브런치 카페</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/kiosk.css}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon/kiosk/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/images/favicon/kiosk/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon/kiosk/favicon-16x16.png"
    />
  </head>
  <body>
    <header class="kiosk-header">
      <div class="cafe-branding">
        <div class="cafe-logo-circle">
          <img
            src="/images/logo.png"
            alt="브런치 카페 로고"
            width="26"
            height="26"
          />
        </div>
        <div class="cafe-name-block">
          <div class="name">버터벨</div>
          <div class="sub">BRUNCH & COFFEE</div>
        </div>
      </div>
      <div class="header-right">
        <span class="header-time" id="header-clock">00:00</span>
      </div>
    </header>

    <div class="subpage-body">
      <div class="stamp-wrapper">
        <!--
          [적립 완료 화면]
          POST /api/member/stamp 응답(StampResponse)의 success=true 일 때
          showSuccess(data)가 이 카드를 display:block으로 전환한다.
          data 구조: { success, memberName, totalPoints, earnedPoints, coupons[], message }
            → MemberApiController.stamp() → MemberService.processStamp()
        -->
        <div
          id="stamp-success-card"
          class="stamp-card"
          style="display: none; text-align: center"
        >
          <div style="font-size: 70px; margin-bottom: 16px">🌟</div>
          <h2 class="stamp-card-title">포인트 적립 완료!</h2>
          <p class="stamp-card-sub">
            <strong id="success-member-name">고객</strong> 고객님, 포인트가
            적립되었습니다.
          </p>

          <!-- StampResponse.memberName, earnedPoints, totalPoints 바인딩 -->
          <div class="member-found-card" style="margin-bottom: 20px">
            <div class="member-found-name" id="success-display-name"></div>
            <div class="member-found-points" style="margin-top: 8px">
              적립된 포인트 :
              <span
                class="points-num"
                style="color: #28a745"
                id="success-earned-points"
              ></span>
            </div>
            <div class="member-found-points">
              누적 포인트 :
              <span class="points-num" id="success-total-points"></span>
            </div>
          </div>

          <!--
            StampResponse.coupons[] 바인딩
            쿠폰 목록은 MemberApiController에서 CouponRepository.findByMemberIdOrderByCreatedAtDesc()로 조회
            각 항목: { name, code, used, discountType(FIXED|PERCENT), discountValue }
          -->
          <div
            id="success-coupon-section"
            class="member-found-card"
            style="display: none; margin-bottom: 20px; text-align: center"
          >
            <div class="member-found-name" style="margin-bottom: 8px">
              사용 가능 쿠폰
            </div>
            <div id="success-coupon-list"></div>
          </div>

          <a
            href="/"
            class="btn-home"
            style="width: 100%; justify-content: center"
          >
            <i class="bi bi-house"></i> 처음으로
          </a>
        </div>

        <!--
          [전화번호 입력 화면]
          페이지 진입 시 기본으로 표시되는 카드.
          1) DOMContentLoaded → StampApi.init() → GET /api/member/stamp-info
             응답: { earnedPoints } → earned-points-banner에 포인트 표시
          2) "적립하기" 클릭 → StampApi.submit() → POST /api/member/stamp
             요청: StampRequest { phone, earnedPoints }
             응답 success=true  → showSuccess() 호출, 이 카드 숨김
             응답 success=false → error-message 영역에 message 표시
        -->
        <div id="stamp-input-card" class="stamp-card">
          <h2 class="stamp-card-title">
            <i class="bi bi-phone" style="color: #d4a96a"></i> 포인트 적립
          </h2>
          <p class="stamp-card-sub">
            전화번호를 입력하시면 포인트가 적립됩니다.<br />등록된 회원 번호만
            조회 가능합니다.
          </p>

          <!--
            GET /api/member/stamp-info 응답의 earnedPoints를 표시
            세션 finalAmount × 5% 로 계산 (MemberApiController.stampInfo())
          -->
          <div
            id="earned-points-banner"
            style="
              display: none;
              background: #fef3e8;
              border-radius: 10px;
              padding: 12px;
              margin-bottom: 16px;
              font-size: 14px;
              color: #6b4226;
              font-weight: 600;
            "
          >
            <i class="bi bi-star-fill" style="color: #f59e0b"></i>
            예상 적립금 :
            <strong id="earned-points-label">0 P</strong>
          </div>

          <!-- 쿠폰 적용 회원: 전화번호 자동 입력 안내 -->
          <div
            id="auto-phone-notice"
            style="
              display: none;
              background: #e8f5e9;
              border-radius: 10px;
              padding: 12px;
              margin-bottom: 16px;
              font-size: 14px;
              color: #2e7d32;
              font-weight: 600;
            "
          >
            <i class="bi bi-check-circle-fill"></i>
            쿠폰 적용 시 입력한 전화번호가 자동으로 입력되었습니다.
          </div>

          <!-- POST /api/member/stamp 응답 success=false 일 때 StampResponse.message를 표시 -->
          <div
            id="error-message"
            style="
              display: none;
              background: #fee2e2;
              border-radius: 10px;
              padding: 12px;
              margin-bottom: 12px;
              font-size: 14px;
              color: #dc2626;
            "
          >
            <i class="bi bi-exclamation-circle"></i>
            <span id="error-text"></span>
          </div>

          <!-- 키패드 입력값을 저장하는 hidden input. PhoneInput.lookup()이 여기에 값을 쓰고 StampApi.submit()이 읽는다 -->
          <input type="hidden" id="phone-value-input" value="" />

          <!-- 전화번호 디스플레이 -->
          <div class="phone-display placeholder" id="phone-display">
            전화번호를 입력하세요
          </div>

          <!-- 숫자 키패드 -->
          <div class="numpad">
            <button class="numpad-key" onclick="PhoneInput.push('1')">1</button>
            <button class="numpad-key" onclick="PhoneInput.push('2')">2</button>
            <button class="numpad-key" onclick="PhoneInput.push('3')">3</button>
            <button class="numpad-key" onclick="PhoneInput.push('4')">4</button>
            <button class="numpad-key" onclick="PhoneInput.push('5')">5</button>
            <button class="numpad-key" onclick="PhoneInput.push('6')">6</button>
            <button class="numpad-key" onclick="PhoneInput.push('7')">7</button>
            <button class="numpad-key" onclick="PhoneInput.push('8')">8</button>
            <button class="numpad-key" onclick="PhoneInput.push('9')">9</button>
            <button
              class="numpad-key key-clear"
              onclick="PhoneInput.clearAll()"
            >
              전체삭제
            </button>
            <button class="numpad-key" onclick="PhoneInput.push('0')">0</button>
            <button class="numpad-key key-del" onclick="PhoneInput.del()">
              <i class="bi bi-backspace"></i>
            </button>
          </div>

          <!-- 회원 정보 카드 (조회 후 표시) -->
          <div
            class="member-found-card"
            id="member-found-card"
            style="display: none"
          >
            <div class="member-found-name" id="member-found-name"></div>
            <div class="member-found-points" id="member-found-points"></div>
          </div>

          <!-- 클릭 시 StampApi.submit() → POST /api/member/stamp 호출 -->
          <button
            type="button"
            class="btn-stamp-confirm"
            id="btn-stamp-confirm"
            onclick="StampApi.submit()"
          >
            적립하기
          </button>

          <a href="/" class="btn-skip-stamp"> 건너뛰기(적립안함) </a>
        </div>
      </div>
      <!-- /stamp-wrapper -->

      <footer class="kiosk-page-footer">
        <a
          th:href="@{/admin/login}"
          href="/admin/login"
          class="kiosk-admin-link"
        >
          <i class="bi bi-person-gear"></i>관리자
        </a>
      </footer>
    </div>
    <!-- /subpage-body -->

    <div class="toast-notification" id="toast"></div>

    <script th:src="@{/js/kiosk.js}"></script>
    <script>
      const StampApi = (() => {
        let _earnedPoints = 0;

        function formatNumber(n) {
          return Number(n).toLocaleString("ko-KR");
        }

        function showError(msg) {
          const box = document.getElementById("error-message");
          document.getElementById("error-text").textContent = msg;
          box.style.display = "block";
        }

        function hideError() {
          document.getElementById("error-message").style.display = "none";
        }

        function showSuccess(data) {
          document.getElementById("stamp-input-card").style.display = "none";
          const card = document.getElementById("stamp-success-card");
          card.style.display = "block";

          document.getElementById("success-member-name").textContent =
            data.memberName || "고객";
          document.getElementById("success-display-name").textContent =
            (data.memberName || "고객") + " 고객님";
          document.getElementById("success-earned-points").textContent =
            "+ " + formatNumber(data.earnedPoints) + " P";
          document.getElementById("success-total-points").textContent =
            formatNumber(data.totalPoints) + " P";

          const coupons = data.coupons || [];
          if (coupons.length > 0) {
            const section = document.getElementById("success-coupon-section");
            const list = document.getElementById("success-coupon-list");
            list.innerHTML = coupons
              .map((c) => {
                const discount =
                  c.discountType === "FIXED"
                    ? formatNumber(c.discountValue) + "원"
                    : c.discountValue + "%";
                const statusBadge = c.used
                  ? '<span style="color:#9e8b7b">(사용완료)</span>'
                  : '<span style="color:#16a34a">(사용가능)</span>';
                return `<div style="font-size:14px; margin-bottom:6px">
                <strong>${c.name || "쿠폰"}</strong> - ${discount} 할인
              </div>`;
              })
              .join("");
            section.style.display = "block";
          }
        }

        // [API 1] GET /api/member/stamp-info
        // 호출: DOMContentLoaded 이벤트 시 자동 실행
        // 처리: MemberApiController.stampInfo() → 세션 finalAmount × 5% 계산
        // 응답: { earnedPoints: number }
        // 결과: _earnedPoints에 저장, 배너(earned-points-banner)에 포인트 표시
        async function init() {
          try {
            const res = await fetch("/api/member/stamp-info");
            if (!res.ok) return;
            const data = await res.json();
            _earnedPoints = data.earnedPoints || 0;
            if (_earnedPoints > 0) {
              document.getElementById("earned-points-label").textContent =
                formatNumber(_earnedPoints) + " P";
              document.getElementById("earned-points-banner").style.display =
                "block";
            }
            if (data.memberPhone) {
              const phone = data.memberPhone;
              document.getElementById("phone-value-input").value = phone;
              const formatted = phone.replace(
                /(\d{3})(\d{3,4})(\d{4})/,
                "$1-$2-$3",
              );
              const display = document.getElementById("phone-display");
              display.textContent = formatted;
              display.classList.remove("placeholder");
              document.querySelector(".numpad").style.display = "none";
              document.getElementById("auto-phone-notice").style.display =
                "block";
            }
          } catch (e) {
            console.warn("stamp-info 조회 실패", e);
          }
        }

        // [API 2] POST /api/member/stamp
        // 호출: "적립하기" 버튼 클릭 (onclick="StampApi.submit()")
        // 요청 Body(StampRequest): { phone: string, earnedPoints: number }
        // 처리: MemberApiController.stamp() → MemberService.processStamp()
        //       → 포인트 적립, 3000P 달성 시 CouponService.issueStampRewardCoupon() 자동 호출
        // 응답(StampResponse):
        //   success=true  → { memberName, totalPoints, earnedPoints, coupons[] }
        //                    showSuccess(data)로 완료 화면 전환
        //   success=false → { message } → showError()로 오류 메시지 표시
        async function submit() {
          const phoneVal =
            document.getElementById("phone-value-input")?.value || "";
          const digits = phoneVal.replace(/\D/g, "");
          if (digits.length < 10) {
            showToast("전화번호를 올바르게 입력해주세요. (10~11자리)");
            return;
          }

          hideError();
          const btn = document.getElementById("btn-stamp-confirm");
          btn.disabled = true;

          try {
            const res = await fetch("/api/member/stamp", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                phone: digits,
                earnedPoints: _earnedPoints,
              }),
            });
            const data = await res.json();

            if (data.success) {
              showSuccess(data);
            } else {
              showError(data.message || "오류가 발생했습니다.");
              btn.disabled = false;
            }
          } catch (e) {
            showError("네트워크 오류가 발생했습니다. 다시 시도해주세요.");
            btn.disabled = false;
          }
        }

        return { init, submit };
      })();

      document.addEventListener("DOMContentLoaded", () => StampApi.init());
    </script>
  </body>
</html>
