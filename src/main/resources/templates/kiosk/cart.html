<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 확인 - 브런치 카페</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/kiosk.css}">
</head>
<body>

<!--
  [백엔드 연동] Controller 필요 변수
  - cartItems : List<CartItemDto>  (필드: menuId, menuName, quantity, unitPrice, emoji)
  - subtotal  : int  (합계 금액)
  - member    : Member (로그인 회원, nullable)
  - couponApplied : boolean
  - couponDiscount: int
-->

<header class="kiosk-header">
  <div class="cafe-branding">
    <div class="cafe-logo-circle">☕</div>
    <div class="cafe-name-block">
      <div class="name">브런치 카페</div>
      <div class="sub">BRUNCH CAFE KIOSK</div>
    </div>
  </div>
  <div class="header-right">
    <span class="header-time" id="header-clock">00:00</span>
  </div>
</header>

<div class="subpage-body">
  <div class="subpage-container">

    <div class="page-title">
      <i class="bi bi-bag-check"></i> 주문 확인
    </div>

    <!-- ─── 주문 목록 ──────────────────────────── -->
    <div class="section-card">
      <div class="section-title">
        <i class="bi bi-list-ul"></i> 선택하신 메뉴
      </div>

      <!-- Thymeleaf 반복 출력 -->
      <div th:each="item : ${cartItems}" class="order-item-row">
        <img class="order-item-icon"
             th:src="${item.imageUrl != null ? item.imageUrl : '/images/menu/default-food.svg'}"
             onerror="this.src='/images/menu/default-food.svg'"
             alt="메뉴 이미지">
        <div class="order-item-info">
          <div class="order-item-name" th:text="${item.menuName}">에그 베네딕트</div>
          <div class="order-item-unit"
               th:text="${#numbers.formatInteger(item.unitPrice,1,'COMMA') + '원 / 1개'}">16,500원 / 1개</div>
        </div>
        <div class="order-qty-ctrl">
          <!--
            [백엔드 연동] 수량 변경: POST /order/cart/update
            또는 JS로 처리 후 폼 재제출
          -->
          <button class="order-qty-btn"
                  th:onclick="'updateCartQty(' + item.menuId + ', -1)'"
                  onclick="updateCartQty(1, -1)">−</button>
          <span class="order-qty-num" th:text="${item.quantity}"
                th:id="'qty-' + item.menuId">1</span>
          <button class="order-qty-btn"
                  th:onclick="'updateCartQty(' + item.menuId + ', 1)'"
                  onclick="updateCartQty(1, 1)">+</button>
        </div>
        <div class="order-item-subtotal"
             th:text="${#numbers.formatInteger(item.unitPrice * item.quantity, 1, 'COMMA') + '원'}"
             th:id="'subtotal-' + item.menuId">16,500원</div>
        <button class="btn-remove-item"
                th:onclick="'removeCartItem(' + item.menuId + ')'"
                onclick="removeCartItem(1)"
                title="삭제">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <!-- 장바구니 비어있을 때 (백엔드 redirected) -->
      <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}"
           style="text-align:center; padding:30px; color:#9E8B7B;">
        <i class="bi bi-cart-x" style="font-size:40px; display:block; margin-bottom:10px;"></i>
        장바구니가 비어있습니다.
        <div style="margin-top:16px;">
          <a th:href="@{/}" href="/" class="btn-back-page">
            <i class="bi bi-arrow-left"></i> 메뉴로 돌아가기
          </a>
        </div>
      </div>

      <!-- 디자인 샘플 데이터 (cartItems가 null인 경우에만 표시) -->
      <div th:if="${cartItems == null}" class="order-item-row">
        <img class="order-item-icon" src="/images/menu/default-food.svg" alt="음식 이미지">
        <div class="order-item-info">
          <div class="order-item-name">에그 베네딕트</div>
          <div class="order-item-unit">16,500원 / 1개</div>
        </div>
        <div class="order-qty-ctrl">
          <button class="order-qty-btn" onclick="updateCartQty(1, -1)">−</button>
          <span class="order-qty-num" id="qty-sample1">1</span>
          <button class="order-qty-btn" onclick="updateCartQty(1, 1)">+</button>
        </div>
        <div class="order-item-subtotal" id="subtotal-sample1">16,500원</div>
        <button class="btn-remove-item" onclick="removeCartItem(1)"><i class="bi bi-x-lg"></i></button>
      </div>
      <div th:if="${cartItems == null}" class="order-item-row">
        <img class="order-item-icon" src="/images/menu/default-drink.svg" alt="음료 이미지">
        <div class="order-item-info">
          <div class="order-item-name">카페 라떼</div>
          <div class="order-item-unit">5,500원 / 1개</div>
        </div>
        <div class="order-qty-ctrl">
          <button class="order-qty-btn" onclick="updateCartQty(8, -1)">−</button>
          <span class="order-qty-num" id="qty-sample2">2</span>
          <button class="order-qty-btn" onclick="updateCartQty(8, 1)">+</button>
        </div>
        <div class="order-item-subtotal" id="subtotal-sample2">11,000원</div>
        <button class="btn-remove-item" onclick="removeCartItem(8)"><i class="bi bi-x-lg"></i></button>
      </div>

    </div><!-- /section-card -->

    <!-- ─── 쿠폰 & 포인트 ─────────────────────── -->
    <div class="section-card">
      <div class="section-title">
        <i class="bi bi-ticket-perforated"></i> 쿠폰 / 포인트
      </div>

      <!-- 쿠폰 입력 -->
      <div style="margin-bottom: 18px;">
        <div style="font-size:14px; font-weight:600; color:#5C3317; margin-bottom:8px;">쿠폰 번호</div>
        <div class="input-row">
          <input type="text" class="form-input" id="coupon-input"
                 placeholder="쿠폰 번호를 입력하세요 (예: CAFE10)" maxlength="20"
                 style="text-transform:uppercase;">
          <button class="btn-apply" onclick="applyCoupon()">적용</button>
        </div>
        <div class="discount-result" id="coupon-result"></div>
      </div>

      <!-- 포인트 사용 -->
      <!--
        [백엔드 연동] member가 로그인 상태일 때만 표시
        th:if="${member != null}"
      -->
      <div th:if="${member != null}">
        <div style="font-size:14px; font-weight:600; color:#5C3317; margin-bottom:8px;">포인트 사용</div>
        <label class="form-check">
          <input type="checkbox" id="use-points-check" onchange="applyPoints()">
          <span>
            보유 포인트
            <strong th:text="${#numbers.formatInteger(member.points, 1, 'COMMA') + ' P'}">1,200 P</strong>
            전액 사용
          </span>
        </label>
        <div id="points-discount" th:data-points="${member.points}" data-points="0" style="display:none;"></div>
      </div>

    </div><!-- /section-card -->

    <!-- ─── 결제 금액 요약 ────────────────────── -->
    <div class="section-card">
      <div class="section-title">
        <i class="bi bi-calculator"></i> 결제 금액
      </div>

      <div class="summary-row">
        <span>상품 금액</span>
        <span id="subtotal-value"
              th:text="${#numbers.formatInteger(subtotal ?: 27500, 1, 'COMMA') + '원'}"
              th:data-amount="${subtotal ?: 27500}">27,500원</span>
      </div>
      <div class="summary-row">
        <span>쿠폰 할인</span>
        <span class="discount-tag" id="coupon-discount-value" data-amount="0">-</span>
      </div>
      <div class="summary-row">
        <span>포인트 사용</span>
        <span class="discount-tag" id="points-use-value">-</span>
      </div>
      <div class="summary-total">
        <span>최종 결제 금액</span>
        <span id="final-total-value"
              th:text="${#numbers.formatInteger(subtotal ?: 27500, 1, 'COMMA') + '원'}">27,500원</span>
      </div>
    </div>

    <!-- ─── 버튼 ──────────────────────────────── -->
    <div class="action-btn-row">
      <a th:href="@{/}" href="/" class="btn-back-page">
        <i class="bi bi-arrow-left"></i> 메뉴로
      </a>
      <!--
        [백엔드 연동]
        POST /order/payment 로 쿠폰코드, 포인트 사용 여부, 총 금액 전송
      -->
      <form id="payment-redirect-form" method="post" th:action="@{/order/payment}" action="/order/payment" style="flex:1; display:flex;">
        <input type="hidden" name="couponCode"      id="hidden-coupon-code">
        <input type="hidden" name="couponDiscount"  id="hidden-coupon-discount" value="0">
        <input type="hidden" name="usePoints"       id="hidden-use-points" value="0">
        <input type="hidden" name="finalAmount"     id="hidden-final-amount"
               th:value="${subtotal ?: 27500}" value="27500">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn-go-pay" style="width:100%;">
          <i class="bi bi-credit-card"></i> 결제하기
        </button>
      </form>
    </div>

    <footer class="kiosk-sub-footer">
      <a th:href="@{/admin/login}" href="/admin/login" class="kiosk-admin-link">관리자</a>
    </footer>
  </div><!-- /subpage-container -->
</div><!-- /subpage-body -->

<div class="toast-notification" id="toast"></div>

<script th:src="@{/js/kiosk.js}"></script>
<script>
  /**
   * 장바구니 페이지 전용 스크립트
   * [백엔드 연동 시] 수량 변경/삭제는 AJAX 또는 폼 서브밋으로 처리하세요.
   */

  // 수량 변경 (서버 세션 기반 예시)
  function updateCartQty(menuId, delta) {
    const qtyEl     = document.getElementById('qty-' + menuId) ||
                      document.getElementById('qty-sample' + menuId);
    const subtotalEl = document.getElementById('subtotal-' + menuId) ||
                      document.getElementById('subtotal-sample' + menuId);
    if (!qtyEl) return;

    let qty = parseInt(qtyEl.textContent) + delta;
    if (qty <= 0) { removeCartItem(menuId); return; }
    qtyEl.textContent = qty;

    // 단가를 data 속성이나 DOM에서 추출 (백엔드 연동 시 AJAX 대체 권장)
    recalcSummary();
  }

  function removeCartItem(menuId) {
    const row = document.getElementById('qty-' + menuId)?.closest('.order-item-row') ||
                document.getElementById('qty-sample' + menuId)?.closest('.order-item-row');
    row?.remove();
    recalcSummary();
  }

  function recalcSummary() {
    // 결제 전 페이지이므로 클라이언트 합산 (백엔드 연동 시 서버 계산으로 대체)
    recalcTotal();
  }

  // 결제하기 클릭 시 할인 정보 폼에 반영
  document.getElementById('payment-redirect-form')?.addEventListener('submit', function() {
    const couponInput = document.getElementById('coupon-input');
    const couponDisc  = document.getElementById('coupon-discount-value');
    const usePointsChk = document.getElementById('use-points-check');
    const pointsEl    = document.getElementById('points-discount');
    const finalEl     = document.getElementById('final-total-value');

    if (couponInput?.value) document.getElementById('hidden-coupon-code').value = couponInput.value;
    if (couponDisc)  document.getElementById('hidden-coupon-discount').value = couponDisc.dataset.amount || 0;

    const available = Number(pointsEl?.dataset.points || 0);
    const subtotal  = Number(document.getElementById('subtotal-value')?.dataset.amount || 0);
    if (usePointsChk?.checked) {
      document.getElementById('hidden-use-points').value = Math.min(available, subtotal);
    }

    // 최종 금액 문자열에서 숫자 추출
    const finalText = finalEl?.textContent?.replace(/[^0-9]/g, '') || '0';
    document.getElementById('hidden-final-amount').value = finalText;
  });
</script>
</body>
</html>
