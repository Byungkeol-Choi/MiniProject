<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>주문 확인 - 브런치 카페</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/kiosk.css}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/images/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon-16x16.png"
    />
  </head>
  <body>
    <!--
[백엔드 연동] Controller 필요 변수
- cartItem : List<CartItemDto>  (필드: menuId, menuName, quantity, unitPrice, imageUrl)
- subtotal  : int  (합계 금액)
- member    : Member (로그인 회원, nullable)
- couponApplied : boolean
- couponDiscount: int
-->

    <header class="kiosk-header">
      <div class="cafe-branding">
        <div class="cafe-logo-circle">
          <img
            src="/images/logo.png"
            alt="브런치 카페 로고"
            width="26"
            height="26"
          />
        </div>
        <div class="cafe-name-block">
          <div class="name">버터벨</div>
          <div class="sub">BRUNCH & COFFEE</div>
        </div>
      </div>
      <div class="header-right">
        <span class="header-time" id="header-clock">00:00</span>
      </div>
    </header>

    <div class="subpage-body">
      <div class="subpage-container">
        <div class="page-title">주문 확인</div>

        <!-- ─── 주문 목록 ──────────────────────────── -->
        <div class="section-card">
          <div class="section-title">
            <i class="bi bi-bag-check"></i> 선택하신 메뉴
          </div>

          <!-- Thymeleaf 반복 출력 -->
          <div th:each="item : ${cartItems}" class="order-item-row">
            <img
              class="order-item-icon"
              th:src="${item.imgUrl != null ? item.imgUrl : '/images/menu/empty.png'}"
              onerror="this.src = '/images/menu/empty.png'"
              alt="메뉴 이미지"
            />
            <div class="order-item-info">
              <div class="order-item-name" th:text="${item.name}">
                에그 베네딕트
              </div>
              <div
                class="order-item-unit"
                th:text="${#numbers.formatInteger(item.price,1,'COMMA') + '원 / 1개'}"
              >
                16,500원 / 1개
              </div>
            </div>
            <div class="order-qty-ctrl">
              <!--
        [백엔드 연동] 수량 변경: POST /order/cart/update
        또는 JS로 처리 후 폼 재제출
          -->
              <button
                class="order-qty-btn"
                th:onclick="|updateCartQty(${item.id}, -1)|"
              >
                −
              </button>
              <span
                class="order-qty-num"
                th:text="${item.quantity}"
                th:id="|qty-${item.id}|"
                >1</span
              >
              <button
                class="order-qty-btn"
                th:onclick="|updateCartQty(${item.id}, 1)|"
              >
                +
              </button>
            </div>
            <div
              class="order-item-subtotal"
              th:text="${#numbers.formatInteger(item.price * item.quantity, 1, 'COMMA') + '원'}"
              th:id="|subtotal-${item.id}|"
            >
              16,500원
            </div>
            <button
              class="btn-remove-item"
              th:onclick="|removeCartItem(${item.id})|"
              title="삭제"
            >
              <i class="bi bi-x-lg"></i>
            </button>
          </div>

          <!-- 장바구니 비어있을 때 (백엔드 redirected) -->
          <div
            th:if="${cartItems == null or #lists.isEmpty(cartItems)}"
            style="text-align: center; padding: 30px; color: #9e8b7b"
          >
            <i
              class="bi bi-cart-x"
              style="font-size: 40px; display: block; margin-bottom: 10px"
            ></i>
            장바구니가 비어있습니다.
            <div style="margin-top: 16px">
              <a th:href="@{/}" href="/" class="btn-back-page"> 메뉴 담기 </a>
            </div>
          </div>

          <!-- 디자인 샘플 데이터 (cartItems가 null인 경우에만 표시) -->
          <div th:if="${cartItems == null}" class="order-item-row">
            <img
              class="order-item-icon"
              src="/images/menu/eggs-benedict.png"
              alt="음식 이미지"
            />
            <div class="order-item-info">
              <div class="order-item-name">에그 베네딕트</div>
              <div class="order-item-unit">16,500원 / 1개</div>
            </div>
            <div class="order-qty-ctrl">
              <button class="order-qty-btn" onclick="updateCartQty(1, -1)">
                −
              </button>
              <span class="order-qty-num" id="qty-sample1">1</span>
              <button class="order-qty-btn" onclick="updateCartQty(1, 1)">
                +
              </button>
            </div>
            <div class="order-item-subtotal" id="subtotal-sample1">
              16,500원
            </div>
            <button class="btn-remove-item" onclick="removeCartItem(1)">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <div th:if="${cartItems == null}" class="order-item-row">
            <img
              class="order-item-icon"
              src="/images/menu/ice-cafelatte.png"
              alt="음료 이미지"
            />
            <div class="order-item-info">
              <div class="order-item-name">카페 라떼</div>
              <div class="order-item-unit">5,500원 / 1개</div>
            </div>
            <div class="order-qty-ctrl">
              <button class="order-qty-btn" onclick="updateCartQty(8, -1)">
                −
              </button>
              <span class="order-qty-num" id="qty-sample2">2</span>
              <button class="order-qty-btn" onclick="updateCartQty(8, 1)">
                +
              </button>
            </div>
            <div class="order-item-subtotal" id="subtotal-sample2">
              11,000원
            </div>
            <button class="btn-remove-item" onclick="removeCartItem(8)">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
        <!-- /section-card -->

        <!-- ─── 쿠폰 & 포인트 ─────────────────────── -->
        <!--
      [API 연동] POST /api/member/lookup
      전화번호 입력 후 "포인트 확인" 클릭 → lookupMemberByPhone() 호출
      응답: MemberLookupResponse { memberName, points, unusedCouponCount, coupons[] }
      미사용 쿠폰 목록 표시 → "쿠폰 적용" 클릭 → applyLookupCoupon() 호출
    -->
        <div class="section-card">
          <div class="section-title">
            <i class="bi bi-ticket-perforated"></i> 쿠폰
          </div>

          <!-- 전화번호 입력 -->
          <div class="input-row" style="margin-bottom: 8px">
            <input
              type="text"
              class="form-input"
              id="lookup-phone-input"
              placeholder="전화번호를 입력하세요 (숫자만, 11자리)"
              maxlength="11"
              inputmode="numeric"
              oninput="this.value = this.value.replace(/\D/g, '')"
            />
            <button class="btn-apply" onclick="lookupMemberByPhone()">
              회원 조회
            </button>
          </div>

          <!-- 오류 메시지 -->
          <div
            id="lookup-error-box"
            class="lookup-error-box"
            style="display: none"
          ></div>

          <!-- 조회 결과 패널 (조회 성공 후 표시) -->
          <div
            id="lookup-result-panel"
            class="lookup-result-panel"
            style="display: none"
          >
            <div class="lookup-result-heading">
              <i class="bi bi-person-fill" style="font-size: 18px"></i>
              <span id="lookup-member-name"></span> 고객님
            </div>
            <div class="lookup-result-row">
              <span class="lookup-result-label">사용 가능 쿠폰</span>
              <span class="lookup-result-value" id="lookup-coupon-count"></span>
            </div>

            <!-- 미사용 쿠폰 목록 -->
            <div id="lookup-coupon-list"></div>
          </div>

          <!-- 쿠폰 적용 결과 -->
          <div
            class="discount-result"
            id="coupon-result"
            style="margin-top: 8px"
          ></div>
        </div>
        <!-- /section-card -->

        <!-- ─── 결제 금액 요약 ────────────────────── -->
        <div class="section-card">
          <div class="section-title">
            <i class="bi bi-credit-card"></i> 결제 금액
          </div>

          <div class="summary-row">
            <span>상품 금액</span>
            <span
              id="subtotal-value"
              th:text="${#numbers.formatInteger(subtotal ?: 27500, 1, 'COMMA') + '원'}"
              th:data-amount="${subtotal ?: 27500}"
              >27,500원</span
            >
          </div>
          <div class="summary-row">
            <span>쿠폰 할인</span>
            <span
              class="discount-tag"
              id="coupon-discount-value"
              data-amount="0"
              >-</span
            >
          </div>
          <div class="summary-total">
            <span>최종 결제 금액</span>
            <span
              id="final-total-value"
              th:text="${#numbers.formatInteger(subtotal ?: 27500, 1, 'COMMA') + '원'}"
              >27,500원</span
            >
          </div>
        </div>

        <!-- ─── 버튼 ──────────────────────────────── -->
        <div class="action-btn-row">
          <a href="/" class="btn-back-page" onclick="goBack(event)">
            <i class="bi bi-arrow-left"></i> 이전
          </a>
          <!--
        [백엔드 연동]
        POST /order/payment 로 쿠폰코드, 포인트 사용 여부, 총 금액 전송
      -->
          <form
            id="payment-redirect-form"
            method="post"
            th:action="@{/order/payment}"
            action="/order/payment"
            style="flex: 1; display: flex"
          >
            <input type="hidden" name="couponCode" id="hidden-coupon-code" />
            <input
              type="hidden"
              name="memberId"
              id="hidden-member-id"
              value="0"
            />
            <input
              type="hidden"
              name="memberName"
              id="hidden-member-name"
              value=""
            />
            <input
              type="hidden"
              name="couponDiscount"
              id="hidden-coupon-discount"
              value="0"
            />
            <input
              type="hidden"
              name="usePoints"
              id="hidden-use-points"
              value="0"
            />
            <input
              type="hidden"
              name="finalAmount"
              id="hidden-final-amount"
              th:value="${subtotal ?: 0}"
              value="0"
            />
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button type="submit" class="btn-go-pay" style="width: 100%">
              결제하기
            </button>
          </form>
        </div>
      </div>
      <!-- /subpage-container -->

      <footer class="kiosk-page-footer">
        <a
          th:href="@{/admin/login}"
          href="/admin/login"
          class="kiosk-admin-link"
        >
          <i class="bi bi-person-gear"></i>관리자
        </a>
      </footer>
    </div>
    <!-- /subpage-body -->

    <div class="toast-notification" id="toast"></div>

    <script th:src="@{/js/kiosk.js}"></script>
    <script>
      //CSRF 토큰
      const token = document.querySelector('meta[name="_csrf"]').content;
      const header = document.querySelector(
        'meta[name="_csrf_header"]',
      ).content;
      /**
       * 장바구니 페이지 전용 스크립트
       * [백엔드 연동 시] 수량 변경/삭제는 AJAX 또는 폼 서브밋으로 처리하세요.
       */

      // 수량 변경 (서버 세션 기반 예시)
      async function updateCartQty(id, delta) {
        try {
          const response = await fetch(`/api/cart/${id}`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              [header]: token,
            },
            body: JSON.stringify({ delta: delta }),
          });

          if (!response.ok) throw new Error("수량 변경 실패");

          const json = await response.json();

          //console.log("quantity:", json.quantity, typeof json.quantity);
          console.log("전체 json:", json); // 전체 응답 확인

          if (json.removed || json.quantity <= 0) {
            // removeCartItem 호출 X - 서버에서 이미 삭제됨
            const row = document
              .getElementById("qty-" + json.id)
              ?.closest(".order-item-row");
            row?.remove();
            recalcSummary();
            return;
          }

          const qtyEl = document.getElementById("qty-" + json.id);
          const subtotalEl = document.getElementById("subtotal-" + json.id);

          if (qtyEl) qtyEl.textContent = json.quantity;
          if (subtotalEl)
            subtotalEl.textContent =
              (json.quantity * json.price).toLocaleString("ko-KR") + "원";

          recalcSummary();
        } catch (error) {
          console.error(error);
        }
      }

      async function removeCartItem(id) {
        try {
          const response = await fetch(`/api/cart/${id}`, {
            method: "DELETE",
            headers: {
              [header]: token,
            },
          });

          if (!response.ok) throw new Error("삭제 실패");

          const json = await response.json();

          const row = document
            .getElementById("qty-" + json.id)
            ?.closest(".order-item-row");

          row?.remove();
          recalcSummary();
        } catch (error) {
          console.error(error);
        }
      }

      function recalcSummary() {
        // 결제 전 페이지이므로 클라이언트 합산 (백엔드 연동 시 서버 계산으로 대체)
        let subtotal = 0;

        document.querySelectorAll(".order-item-row").forEach((row) => {
          const idMatch = row.querySelector("[id^='qty-']");
          if (!idMatch) return;

          const id = idMatch.id.replace("qty-", "");
          const qty = parseInt(idMatch.textContent || "0");
          const subtotalEl = document.getElementById("subtotal-" + id);
          if (!subtotalEl) return;

          // "16,500원" → 16500
          const itemSubtotal = parseInt(
            subtotalEl.textContent.replace(/[^0-9]/g, ""),
          );
          subtotal += itemSubtotal;
        });

        const subtotalEl = document.getElementById("subtotal-value");
        if (subtotalEl) {
          subtotalEl.textContent = subtotal.toLocaleString("ko-KR") + "원";
          subtotalEl.dataset.amount = subtotal;
        }

        recalcTotal();
      }

      // 결제하기 클릭 시 할인 정보 폼에 반영
      document
        .getElementById("payment-redirect-form")
        ?.addEventListener("submit", function () {
          const couponInput = document.getElementById("coupon-input");
          const couponDisc = document.getElementById("coupon-discount-value");
          const finalEl = document.getElementById("final-total-value");

          if (couponInput?.value)
            document.getElementById("hidden-coupon-code").value =
              couponInput.value;
          if (couponDisc)
            document.getElementById("hidden-coupon-discount").value =
              couponDisc.dataset.amount || 0;

          // 최종 금액 문자열에서 숫자 추출
          const finalText = finalEl?.textContent?.replace(/[^0-9]/g, "") || "0";
          document.getElementById("hidden-final-amount").value = finalText;
        });

      // 이전으로 가기
      window.goBack = async function (event) {
        event.preventDefault();
        const response = await fetch("/api/cart/session");
        const items = await response.json();
        const converted = items.map((item) => ({
          id: Number(item.id),
          name: item.name,
          price: Number(item.price),
          quantity: Number(item.quantity),
          imgUrl: item.imgUrl || "/images/menu/default-food.svg",
        }));
        sessionStorage.setItem("cafe_cart", JSON.stringify(converted));
        window.location.href = "/";
      };
    </script>
  </body>
</html>
