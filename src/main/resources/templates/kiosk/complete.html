<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 - 브런치 카페</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/kiosk.css}">
</head>
<body>

<!--
  [백엔드 연동] Controller 필요 변수
  - orderNo      : int  (주문 번호, 예: 42)
  - finalAmount  : int  (결제 금액)
  - paymentMethod: String (CARD / CASH / KAKAO_PAY / NAVER_PAY)
  - earnedPoints : int  (이번 주문으로 적립될 포인트)
-->

<header class="kiosk-header">
  <div class="cafe-branding">
    <div class="cafe-logo-circle">
      <img
              src="/images/logo.png"
              alt="브런치 카페 로고"
              width="26"
              height="26"
      />
    </div>
    <div class="cafe-name-block">
      <div class="name">버터벨</div>
      <div class="sub">BRUNCH & COFFEE</div>
    </div>
  </div>
  <div class="header-right">
    <span class="header-time" id="header-clock">00:00</span>
  </div>
</header>

<div class="subpage-body">
  <div class="complete-wrapper">

    <!-- 완료 아이콘 -->
    <div class="complete-icon">
      <img src="/images/complete.svg" alt="결제 완료" width="90" height="90">
    </div>

    <h1 class="complete-title">결제가 완료되었습니다!</h1>
    <p class="complete-subtitle">
      <!-- [백엔드 연동] th:text="${paymentMethodLabel}" -->
      <span id="payment-method-label">카드</span>결제가 성공적으로 처리되었습니다.
    </p>

    <!-- 주문 번호 -->
    <div class="order-num-box">
      <div class="order-num-label">주문 번호</div>
      <div class="order-num-value"
           th:text="${orderNo ?: 42}"
           id="order-number">42</div>
    </div>

    <!-- 결제 금액 -->
    <div style="background:white; border-radius:12px; padding:18px 32px; box-shadow:0 2px 12px rgba(92,51,23,0.1); margin-bottom:24px; text-align:center;">
      <div style="font-size:13px; color:#9E8B7B; margin-bottom:4px;">결제 금액</div>
      <div style="font-size:28px; font-weight:700; color:#5C3317;"
           th:text="${#numbers.formatInteger(finalAmount ?: 27500, 1, 'COMMA') + '원'}">27,500원</div>
    </div>

    <!-- 포인트 적립 안내 -->
    <div th:if="${(earnedPoints ?: 0) > 0}"
         style="background:#F0FFF4; border:2px solid #28a745; border-radius:12px; padding:14px 24px; margin-bottom:24px; font-size:15px; font-weight:600; color:#1a7431; text-align:center;">
      <i class="bi bi-star-fill" style="color:#F59E0B;"></i>
      이번 주문으로
      <strong th:text="${earnedPoints ?: 0}">275</strong>P 포인트가 적립됩니다.
    </div>

    <!-- 번호 안내 -->
    <div style="background:white; border-radius:12px; padding:16px 24px; box-shadow:0 2px 12px rgba(92,51,23,0.08); margin-bottom:30px; font-size:14px; color:#6B4226; text-align:center; line-height:1.8;">
      <i class="bi bi-bell-fill" style="color:#D4A96A;"></i>
      주문번호 <strong th:text="${orderNo ?: 42}">42</strong>번이 호출되면 카운터에서 수령하세요.
    </div>

    <!-- 버튼 -->
    <div style="display:flex; flex-wrap:wrap; justify-content:center;">

      <!-- 포인트 적립 (전화번호 입력) -->
      <a th:href="@{/member/stamp(orderNo=${orderNo})}" href="/member/stamp" class="btn-stamp">
        포인트 적립
      </a>

      <!-- 홈으로 -->
      <a th:href="@{/}" href="/" class="btn-home">
        <i class="bi bi-house"></i> 처음으로
      </a>
    </div>

    <!-- 자동 이동 카운트다운 -->
    <p style="margin-top:24px; font-size:13px; color:#9E8B7B;">
      <span id="countdown">30</span>초 후 자동으로 처음 화면으로 이동합니다.
    </p>

  </div><!-- /complete-wrapper -->

  <footer class="kiosk-page-footer">
    <a th:href="@{/admin/login}" href="/admin/login" class="kiosk-admin-link">
      <i class="bi bi-person-gear"></i>관리자
    </a>
  </footer>
</div><!-- /subpage-body -->

<script th:src="@{/js/kiosk.js}"></script>
<script>
  // 결제 수단 라벨 표시
  const methodMap = {
    CARD:       '카드',
    CASH:       '현금',
    KAKAO_PAY:  '카카오페이',
    NAVER_PAY:  '네이버페이'
  };
  // [백엔드 연동] th:attr로 data-method 값 전달 가능
  const methodEl = document.getElementById('payment-method-label');
  // if (methodEl) methodEl.textContent = methodMap['[[${paymentMethod}]]'] || '카드';

  // 자동 리다이렉트 (30초 후)
  let remaining = 30;
  const countdownEl = document.getElementById('countdown');
  const timer = setInterval(() => {
    remaining--;
    if (countdownEl) countdownEl.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(timer);
      // 장바구니 초기화 후 홈으로
      sessionStorage.removeItem('cafe_cart');
      window.location.href = '/';
    }
  }, 1000);

  // 버튼 클릭 시 타이머 정지
  document.querySelectorAll('.btn-home, .btn-stamp').forEach(btn => {
    btn.addEventListener('click', () => {
      clearInterval(timer);
      sessionStorage.removeItem('cafe_cart');
    });
  });
</script>
</body>
</html>
