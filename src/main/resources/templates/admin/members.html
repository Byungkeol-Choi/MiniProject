<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 관리 - 브런치 카페 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<!--
  [백엔드 연동] Controller 필요 변수
  - members     : Page<Member> (필드: id, phone, name, points, createdAt, orderCount)
  - totalMembers: int
  - adminName   : String
  - pendingCount: int

  URL 예시: GET /admin/members?keyword=010&page=0
-->

<div class="admin-layout">

  <aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <div class="topbar-title">
        <i class="bi bi-people"></i> 회원 관리
      </div>
      <div class="topbar-right">
        <span style="font-size:13px; color:#6B7A8D;">
          총 <strong th:text="${totalMembers ?: 142}" style="color:#1E2A38;">142</strong>명
        </span>
      </div>
    </div>

    <div class="page-content">

      <div class="data-card">
        <div class="data-card-header">
          <div class="data-card-title">
            <i class="bi bi-person-lines-fill"></i> 회원 목록
          </div>
          <div class="data-card-actions">
            <div class="search-box">
              <i class="bi bi-search"></i>
              <input type="text" id="member-search" placeholder="전화번호, 이름 검색...">
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div style="overflow-x:auto;">
          <table class="admin-table" id="members-table">
            <thead>
              <tr>
                <th>번호</th>
                <th>전화번호</th>
                <th>이름</th>
                <th>보유 포인트</th>
                <th>가입일</th>
                <th>보유 쿠폰</th>
              </tr>
            </thead>
            <tbody>

              <!-- Thymeleaf 반복 -->
              <tr th:each="member : ${members}">
                <td style="color:#9E8B7B;" th:text="${member.id}">#1</td>
                <td style="font-weight:600;" th:text="${member.displayPhone}">010-1234-5678</td>
                <td th:text="${member.name ?: '-'}">홍길동</td>
                <td>
                  <span class="points-tag"
                        th:id="'member-points-' + member.id"
                        th:text="${#numbers.formatInteger(member.points, 1, 'COMMA') + ' P'}">1,200 P</span>
                </td>
                <td th:text="${#temporals.format(member.createdAt, 'yyyy.MM.dd')}">2025.11.04</td>
                <td th:text="${couponCounts[memberStat.index] ?: 0} + '개'">0개</td>
              </tr>

              <!-- 샘플 데이터 -->
              <tr th:if="${members == null}">
                <td style="color:#9E8B7B;">1</td>
                <td style="font-weight:600;">010-1234-5678</td>
                <td>홍길동</td>
                <td><span class="points-tag" id="member-points-1">1,200 P</span></td>
                <td>2025.08.15</td>
                <td>0개</td>
              </tr>
              <tr th:if="${members == null}">
                <td style="color:#9E8B7B;">2</td>
                <td style="font-weight:600;">010-9876-5432</td>
                <td>김민지</td>
                <td><span class="points-tag" id="member-points-2">3,450 P</span></td>
                <td>2025.06.22</td>
                <td>0개</td>
              </tr>
              <tr th:if="${members == null}">
                <td style="color:#9E8B7B;">3</td>
                <td style="font-weight:600;">010-5555-1234</td>
                <td>이준혁</td>
                <td><span class="points-tag" id="member-points-3">800 P</span></td>
                <td>2026.01.10</td>
                <td>0개</td>
              </tr>
              <tr th:if="${members == null}">
                <td style="color:#9E8B7B;">4</td>
                <td style="font-weight:600;">010-7777-8888</td>
                <td>박서연</td>
                <td><span class="points-tag" id="member-points-4">5,100 P</span></td>
                <td>2025.03.05</td>
                <td>0개</td>
              </tr>

            </tbody>
          </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination-wrap">
          <span th:if="${members != null}" th:text="'총 ' + ${members.totalElements} + '명'">총 4명</span>
          <span th:if="${members == null}">총 4명 (샘플)</span>
          <ul class="pagination" th:if="${members != null and members.totalPages > 1}">
            <li>
              <a th:href="@{/admin/members(page=${members.number - 1})}"
                 class="page-link" th:classappend="${members.first ? 'disabled' : ''}">
                <i class="bi bi-chevron-left"></i>
              </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, members.totalPages - 1)}">
              <a th:href="@{/admin/members(page=${i})}"
                 class="page-link" th:classappend="${i == members.number ? 'active' : ''}"
                 th:text="${i + 1}">1</a>
            </li>
            <li>
              <a th:href="@{/admin/members(page=${members.number + 1})}"
                 class="page-link" th:classappend="${members.last ? 'disabled' : ''}">
                <i class="bi bi-chevron-right"></i>
              </a>
            </li>
          </ul>
        </div>

      </div><!-- /data-card -->
    </div><!-- /page-content -->
  </div><!-- /admin-content -->
</div><!-- /admin-layout -->



<script th:src="@{/js/admin.js}"></script>
</body>
</html>
