<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  lang="ko"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 관리 - 브런치 카페 관리자</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon/admin/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/images/favicon/admin/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon/admin/favicon-16x16.png"
    />
  </head>
  <body>
    <!--
      [백엔드 연동] Controller 필요 변수
      - members     : Page<Member> (필드: id, phone, name, points, createdAt, orderCount)
      - totalMembers: int
      - adminName   : String
      - pendingCount: int

      URL 예시: GET /admin/members?keyword=010&page=0
    -->

    <div class="admin-layout">
      <aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>

      <div class="admin-content">
        <div class="admin-topbar">
          <div class="topbar-title">
            <i class="bi bi-people" style="color: #1e2a38"></i> 회원 관리
          </div>
          <div class="topbar-right">
            <button
              type="button"
              class="btn-primary"
              onclick="openAddMemberModal()"
            >
              + 회원 추가
            </button>
          </div>
        </div>

        <div class="page-content">
          <div class="data-card">
            <div class="data-card-header">
              <div class="data-card-title-wrap">
                <div class="data-card-title">회원 목록</div>
                <span
                  class="data-card-txt"
                  th:if="${members != null}"
                  th:text="'총 ' + ${members.totalElements} + '명'"
                >
                  총 0명
                </span>
                <span th:if="${members == null}">총 4명 (샘플)</span>
              </div>
              <div class="data-card-actions">
                <div class="search-box">
                  <i class="bi bi-search"></i>
                  <input
                    type="text"
                    id="member-search"
                    placeholder="전화번호, 이름 검색..."
                  />
                </div>
              </div>
            </div>

            <!-- 테이블 -->
            <div style="overflow-x: auto">
              <table class="admin-table" id="members-table">
                <thead>
                  <tr>
                    <th>번호</th>
                    <th>전화번호</th>
                    <th>이름</th>
                    <th>보유포인트</th>
                    <th>가입일</th>
                    <th>보유쿠폰</th>
                    <th>쿠폰상세</th>
                    <th>쿠폰발급</th>
                    <th>삭제</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Thymeleaf 반복 -->
                  <tr th:each="member : ${members}">
                    <td th:text="${member.id}">#1</td>
                    <td th:text="${member.displayPhone}">010-1234-5678</td>
                    <td th:text="${member.name ?: '-'}">홍길동</td>
                    <td>
                      <span
                        class="points-tag"
                        th:id="'member-points-' + member.id"
                        th:text="${#numbers.formatInteger(member.points, 1, 'COMMA') + ' P'}"
                        >1,200 P</span
                      >
                    </td>
                    <td
                      th:text="${#temporals.format(member.createdAt, 'yyyy.MM.dd')}"
                    >
                      2025.11.04
                    </td>
                    <td th:text="${couponCounts[memberStat.index] ?: 0} + '개'">
                      0개
                    </td>
                    <td>
                      <div class="member-manage-row">
                        <button
                          class="btn-edit btn-sm"
                          th:data-member-id="${member.id}"
                          th:data-member-name="${member.name ?: member.phone}"
                          onclick="openCouponModal(this)"
                        >
                          <i class="bi bi-eye"></i> 보기
                        </button>
                      </div>
                    </td>
                    <td>
                      <div class="member-manage-row">
                        <button
                          class="btn-edit btn-sm"
                          th:data-member-id="${member.id}"
                          th:data-member-name="${member.name ?: member.phone}"
                          onclick="addCouponModal(this)"
                        >
                          + 발급
                        </button>
                      </div>
                    </td>
                    <td>
                      <div class="member-manage-row">
                        <button
                          class="btn-danger btn-sm"
                          th:data-member-id="${member.id}"
                          th:data-member-name="${member.name ?: member.phone}"
                          onclick="deleteMember(this)"
                        >
                          <i class="bi bi-trash3"></i> 삭제
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination-wrap">
              <ul
                class="pagination"
                th:if="${members != null and members.totalPages > 1}"
              >
                <li>
                  <a
                    th:href="@{/admin/members(page=${members.number - 1})}"
                    class="page-link"
                    th:classappend="${members.first ? 'disabled' : ''}"
                  >
                    <i class="bi bi-chevron-left"></i>
                  </a>
                </li>
                <li
                  th:each="i : ${#numbers.sequence(0, members.totalPages - 1)}"
                >
                  <a
                    th:href="@{/admin/members(page=${i})}"
                    class="page-link"
                    th:classappend="${i == members.number ? 'active' : ''}"
                    th:text="${i + 1}"
                    >1</a
                  >
                </li>
                <li>
                  <a
                    th:href="@{/admin/members(page=${members.number + 1})}"
                    class="page-link"
                    th:classappend="${members.last ? 'disabled' : ''}"
                  >
                    <i class="bi bi-chevron-right"></i>
                  </a>
                </li>
              </ul>
            </div>
          </div>
          <!-- /data-card -->
        </div>
        <!-- /page-content -->
      </div>
      <!-- /admin-content -->
    </div>
    <!-- /admin-layout -->

    <!-- 쿠폰 관리 모달 (admin.css: .modal-overlay / .modal-box) - 목록용 -->
    <div id="coupon-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title" id="coupon-modal-title">쿠폰 관리</div>
          <button
            type="button"
            class="modal-close"
            onclick="closeCouponModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <!-- 쿠폰 목록 -->
          <div class="form-group">
            <div class="form-label">보유 쿠폰 목록</div>
            <div
              id="coupon-list-wrap"
              style="
                border-bottom: 1px solid var(--border);
                border-top: 1px solid var(--border);
                margin-bottom: 18px;
              "
            >
              <div class="coupon-empty">쿠폰 정보를 불러오는 중...</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-primary"
            onclick="closeCouponModal()"
          >
            확인
          </button>
        </div>
      </div>
    </div>

    <!-- 쿠폰 관리 모달 (admin.css: .modal-overlay / .modal-box) - 발급용 -->
    <div id="coupon-add-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title" id="coupon-add-modal-title">쿠폰 발급</div>
          <button
            type="button"
            class="modal-close"
            onclick="closeCouponModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <!-- 쿠폰 발급 폼 -->
          <form
            id="coupon-issue-form"
            class="coupon-create-form"
            onsubmit="issueCoupon(event)"
          >
            <div class="form-group">
              <label class="form-label">쿠폰 이름</label>
              <input
                type="text"
                class="form-control"
                id="new-coupon-name"
                name="couponName"
                placeholder="예: 3,000원 할인 쿠폰"
                required
                maxlength="100"
              />
            </div>
            <div class="form-group">
              <label class="form-label">할인 유형</label>
              <select
                class="form-select"
                id="new-coupon-type"
                name="couponType"
              >
                <option value="FIXED">금액 할인 (FIXED)</option>
                <option value="PERCENT">비율 할인 (PERCENT)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">할인 값</label>
              <input
                type="number"
                class="form-control"
                id="new-coupon-value"
                name="couponValue"
                placeholder="예: 3000"
                min="1"
                step="1"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">만료일</label>
              <input
                type="datetime-local"
                class="form-control"
                id="new-coupon-expires"
                name="couponExpires"
              />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            onclick="closeCouponModal()"
          >
            취소
          </button>
          <button type="submit" form="coupon-issue-form" class="btn-primary">
            발급
          </button>
        </div>
      </div>
    </div>

    <!-- 회원 추가 모달 (admin.css: .modal-overlay / .modal-box) -->
    <div id="add-member-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title" id="add-member-modal-title">회원 추가</div>
          <button
            type="button"
            class="modal-close"
            onclick="closeAddMemberModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <form id="add-member-form" onsubmit="addMember(event)">
            <div class="form-group">
              <label class="form-label">전화번호</label>
              <input
                type="text"
                class="form-control"
                id="add-member-phone"
                name="phone"
                placeholder="010-1234-5678"
                required
                autocomplete="tel"
              />
            </div>
            <div class="form-group">
              <label class="form-label">이름</label>
              <input
                type="text"
                class="form-control"
                id="add-member-name"
                name="name"
                placeholder="홍길동"
              />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            onclick="closeAddMemberModal()"
          >
            취소
          </button>
          <button
            type="submit"
            form="add-member-form"
            class="btn-member-add-submit"
          >
            회원 추가
          </button>
        </div>
      </div>
    </div>

    <style>
      /* 쿠폰 모달은 목록이 넓어 공통 모달보다 조금 넓게 */
      #coupon-modal .modal-box,
      #coupon-add-modal .modal-box {
        max-width: 620px;
      }

      .btn-coupon-manage {
        padding: 4px 12px;
        background: #6b5344;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-coupon-manage:hover {
        background: #4e3a2c;
      }

      .coupon-section-title {
        font-size: 13px;
        font-weight: 700;
        color: #5c4d3c;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .coupon-empty {
        color: #aaa;
        font-size: 13px;
        padding: 10px 0;
        text-align: center;
      }
      .coupon-list-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .coupon-list-table th {
        background: #f5f0ec;
        color: #6b7a8d;
        font-weight: 600;
        padding: 7px 10px;
        text-align: left;
        border-bottom: 1px solid #e8ddd5;
      }
      .coupon-list-table td {
        padding: 7px 10px;
        border-bottom: 1px solid #f0ebe7;
        color: #1e2a38;
        vertical-align: middle;
      }
      .coupon-badge-used {
        color: #aaa;
        font-size: 11px;
      }
      .coupon-badge-unused {
        color: #2e7d32;
        font-size: 11px;
        font-weight: 600;
      }
      .btn-coupon-delete {
        padding: 3px 10px;
        background: #e53935;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 11px;
        cursor: pointer;
      }
      .btn-coupon-delete:hover {
        background: #b71c1c;
      }
      .coupon-create-form {
        display: flex;
        flex-direction: column;
      }
      .coupon-form-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .coupon-form-row label {
        min-width: 90px;
        font-size: 13px;
        color: #4a4a4a;
        font-weight: 600;
      }
      .coupon-form-row input,
      .coupon-form-row select {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 13px;
      }
      .btn-coupon-issue {
        margin-top: 4px;
        padding: 8px 20px;
        background: #6b5344;
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        align-self: flex-start;
      }
      .btn-coupon-issue:hover {
        background: #4e3a2c;
      }

      /* ─── 회원 추가/삭제 UI ────────────────────────────── */
      .btn-member-add {
        margin-left: 10px;
        padding: 7px 14px;
        background: #6b5344;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-member-add:hover {
        background: #4e3a2c;
      }

      .member-manage-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn-member-delete {
        padding: 3px 10px;
        background: #e53935;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-member-delete:hover {
        background: #b71c1c;
      }

      #add-member-form.modal-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .add-member-form-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .add-member-form-row label {
        min-width: 90px;
        font-size: 13px;
        color: #4a4a4a;
        font-weight: 600;
      }
      .add-member-form-row input {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 13px;
      }
      .btn-member-add-submit {
        margin-top: 2px;
        padding: 8px 20px;
        background: #6b5344;
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        align-self: flex-start;
      }
      .btn-member-add-submit:hover {
        background: #4e3a2c;
      }
    </style>

    <script>
      let currentMemberId = null;

      function updateAddMemberPhoneValidity() {
        const phone = document.getElementById("add-member-phone");
        if (!phone) return;
        const digits = phone.value.replace(/\D/g, "");
        if (phone.value.trim() === "") {
          phone.setCustomValidity("");
        } else if (digits.length < 10 || digits.length > 11) {
          phone.setCustomValidity("전화번호는 10~11자리 숫자로 입력해 주세요.");
        } else {
          phone.setCustomValidity("");
        }
      }

      (function initAddMemberPhoneValidation() {
        const phone = document.getElementById("add-member-phone");
        if (phone)
          phone.addEventListener("input", updateAddMemberPhoneValidity);
      })();

      function openCouponModal(btn) {
        currentMemberId = btn.dataset.memberId;
        const name = btn.dataset.memberName;
        document.getElementById("coupon-modal-title").textContent =
          name + "님 보유 쿠폰";
        document.getElementById("coupon-modal").classList.add("open");
        loadCoupons();
      }

      function addCouponModal(btn) {
        currentMemberId = btn.dataset.memberId;
        const name = btn.dataset.memberName;
        document.getElementById("coupon-add-modal-title").textContent =
          name + "님 쿠폰 발급";
        document.getElementById("coupon-issue-form")?.reset();
        document.getElementById("coupon-add-modal").classList.add("open");
      }

      function closeCouponModal() {
        document.getElementById("coupon-modal")?.classList.remove("open");
        document.getElementById("coupon-add-modal")?.classList.remove("open");
        currentMemberId = null;
      }

      async function loadCoupons() {
        const wrap = document.getElementById("coupon-list-wrap");
        wrap.innerHTML = '<div class="coupon-empty">불러오는 중...</div>';
        try {
          const res = await fetch(
            "/admin/api/members/" + currentMemberId + "/coupons",
          );
          const data = await res.json();
          if (!res.ok) {
            wrap.innerHTML =
              '<div class="coupon-empty">' +
              (data.error || "오류 발생") +
              "</div>";
            return;
          }
          if (data.length === 0) {
            wrap.innerHTML =
              '<div class="coupon-empty">발급된 쿠폰이 없습니다.</div>';
            return;
          }
          const now = new Date();
          let html =
            '<table class="admin-table"><thead><tr><th>이름</th><th>코드</th><th>할인</th><th>상태</th><th>만료일</th><th>삭제</th></tr></thead><tbody>';
          data.forEach((c) => {
            const discount =
              c.discountType === "FIXED"
                ? c.discountValue.toLocaleString() + "원"
                : c.discountValue + "%";
            const expires = c.expiresAt ? c.expiresAt.substring(0, 10) : "-";
            // 만료됨 추가
            let statusBadge;
            if (c.used) {
              statusBadge = '<span class="coupon-badge-used">사용됨</span>';
            } else if (c.expiresAt && new Date(c.expiresAt) < now) {
              statusBadge = '<span class="coupon-badge-used">만료됨</span>';
            } else {
              statusBadge = '<span class="coupon-badge-unused">미사용</span>';
            }
            const deleteBtn =
              '<button class="btn-coupon-delete" onclick="deleteCoupon(' +
              c.id +
              ')">삭제</button>';

            html +=
              "<tr><td>" +
              c.name +
              '</td><td style="font-family:monospace;font-size:12px">' +
              c.code +
              "</td><td>" +
              discount +
              "</td><td>" +
              statusBadge +
              "</td><td>" +
              expires +
              "</td><td>" +
              deleteBtn +
              "</td></tr>";
          });
          html += "</tbody></table>";
          wrap.innerHTML = html;
        } catch (e) {
          wrap.innerHTML =
            '<div class="coupon-empty">쿠폰 목록을 불러올 수 없습니다.</div>';
        }
      }

      async function deleteCoupon(couponId) {
        if (!confirm("이 쿠폰을 삭제하시겠습니까?")) return;
        const res = await fetch("/admin/api/coupons/" + couponId, {
          method: "DELETE",
        });
        const data = await res.json();
        if (res.ok) {
          loadCoupons();
        } else {
          alert(data.error || "삭제 중 오류가 발생했습니다.");
        }
      }

      async function issueCoupon(event) {
        event.preventDefault();
        const name = document.getElementById("new-coupon-name").value.trim();
        const discountType = document.getElementById("new-coupon-type").value;
        const discountValue = parseInt(
          document.getElementById("new-coupon-value").value,
          10,
        );
        const expiresRaw = document.getElementById("new-coupon-expires").value;
        const expiresAt = expiresRaw
          ? expiresRaw.replace("T", "T").padEnd(19, ":00").substring(0, 19)
          : "";

        const body = { name, discountType, discountValue, expiresAt };
        try {
          const res = await fetch(
            "/admin/api/members/" + currentMemberId + "/coupons",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            },
          );
          const data = await res.json().catch(() => ({}));
          if (res.ok) {
            showAdminToast("쿠폰이 발급되었습니다. 코드: " + (data.code || ""));
            document.getElementById("coupon-issue-form").reset();
            const listOpen = document
              .getElementById("coupon-modal")
              ?.classList.contains("open");
            if (listOpen) loadCoupons();
          } else {
            showAdminToast(
              data.error || "발급 중 오류가 발생했습니다.",
              "error",
            );
          }
        } catch (e) {
          showAdminToast("네트워크 오류가 발생했습니다.", "error");
        }
      }
    </script>

    <script th:src="@{/js/admin.js}"></script>
  </body>
</html>
