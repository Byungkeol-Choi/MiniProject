<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  lang="ko"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 관리 - 브런치 카페 관리자</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/admin-favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/images/admin-favicon/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/admin-favicon/favicon-16x16.png"
    />
  </head>
  <body>
    <!--
  [백엔드 연동] Controller 필요 변수
  - menus      : List<Menu> (필드: id, name, price, category, imageUrl, description, available)
  - adminName  : String
  - pendingCount: int

  POST /admin/menus        → 메뉴 등록
  PUT  /admin/menus/{id}   → 메뉴 수정
  DELETE /admin/menus/{id} → 메뉴 삭제
  PATCH  /admin/menus/{id}/available → 판매 상태 변경
-->

<div class="admin-layout">

  <aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>

      <div class="admin-content">
        <div class="admin-topbar">
          <div class="topbar-title">
            <i class="bi bi-grid" style="color: #1e2a38"></i> 메뉴 관리
          </div>
          <div class="topbar-right">
            <button class="btn-primary" onclick="openMenuModal(null)">
              <i class="bi bi-plus-lg"></i> 메뉴 추가
            </button>
          </div>
        </div>

    <div class="page-content">

      <div class="data-card">
        <div class="data-card-header">
          <div class="data-card-title">
            <i class="bi bi-card-list" style="color: #1e2a38"></i> 메뉴 목록
          </div>
          <div class="data-card-actions">
            <div class="search-box">
              <i class="bi bi-search"></i>
              <input type="text" id="menu-search" placeholder="메뉴명 검색...">
            </div>
            <select class="filter-select" id="category-filter" onchange="filterByCategory(this.value)">
              <option value="">전체 카테고리</option>
              <option value="FOOD">음식 메뉴</option>
              <option value="DRINK">음료 메뉴</option>
            </select>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="admin-table" id="menus-table">
            <thead>
              <tr>
                <th>번호</th>
                <th>이미지</th>
                <th>메뉴명</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>설명</th>
                <th>판매 상태</th>
                <th>변경</th>
                <th>수정</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody>

              <!-- Thymeleaf 반복 -->
              <tr th:each="menu : ${menus}"
                  th:id="'menu-row-' + menu.id"
                  th:data-category="${menu.category.name()}"
                  th:data-id="${menu.id}"
                  th:data-name="${menu.name}">
                <td style="color:#9E8B7B;" th:text="${menu.id}">1</td>
                <td>
                  <div class="img-preview" style="width:50px; height:42px; font-size:0;">
                    <img th:src="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl) ? menu.imageUrl : (menu.category.name() == 'FOOD' ? '/images/menu/default-food.svg' : '/images/menu/default-drink.svg')}"
                         th:alt="${menu.name}"
                         onerror="this.src='/images/menu/default-food.svg'"
                         style="width:100%;height:100%;object-fit:cover">
                  </div>
                </td>
                <td>
                  <span class="menu-name-cell" th:text="${menu.name}"
                        th:style="${!menu.available} ? 'opacity:0.5' : ''">에그 베네딕트</span>
                </td>
                <td>
                  <span class="badge"
                        th:classappend="${menu.category.name() == 'FOOD' ? 'badge-food' : 'badge-drink'}"
                        th:text="${menu.category.name() == 'FOOD' ? '음식' : '음료'}">음식</span>
                </td>
                <td style="font-weight:600;"
                    th:text="${#numbers.formatInteger(menu.price, 1, 'COMMA') + '원'}">16,500원</td>
                <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#6B7A8D;"
                    th:text="${menu.description}">홀란다이즈 소스와 수란이 올라간 브런치</td>
                <td>
                  <span class="badge menu-status-badge"
                        th:classappend="${menu.available ? 'badge-available' : 'badge-soldout'}"
                        th:text="${menu.available ? '판매중' : '품절'}">판매중</span>
                </td>
                <td>
                  <select class="status-select menu-availability-select"
                          th:attr="data-original-available=${menu.available}">
                    <option value="true" th:selected="${menu.available}">판매중</option>
                    <option value="false" th:selected="${!menu.available}">품절</option>
                  </select>
                </td>
                <td>
                  <button class="btn-edit btn-sm"
                          onclick="openMenuModal(this.closest('tr').dataset.id)">
                    <i class="bi bi-pencil"></i> 수정
                  </button>
                </td>
                <td>
                  <button class="btn-danger btn-sm"
                          onclick="deleteMenu(this.closest('tr').dataset.id, this.closest('tr').dataset.name)">
                    <i class="bi bi-trash3"></i> 삭제
                  </button>
                </td>
              </tr>

              <!-- 샘플 데이터 -->
              <tr th:if="${menus == null}" id="menu-row-1" data-category="FOOD" data-id="1" data-name="에그 베네딕트">
                <td style="color:#9E8B7B;">1</td>
                <td><div class="img-preview" style="width:50px;height:42px;"><img src="/images/menu/default-food.svg" alt="에그 베네딕트" style="width:100%;height:100%;object-fit:cover;"></div></td>
                <td><span class="menu-name-cell">에그 베네딕트</span></td>
                <td><span class="badge badge-food">음식</span></td>
                <td style="font-weight:600;">16,500원</td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6B7A8D;">홀란다이즈 소스와 수란이 올라간 브런치의 정석</td>
                <td><span class="badge menu-status-badge badge-available">판매중</span></td>
                <td>
                  <select class="status-select menu-availability-select" data-original-available="true">
                    <option value="true" selected>판매중</option>
                    <option value="false">품절</option>
                  </select>
                </td>
                <td><button class="btn-edit btn-sm" onclick="openMenuModal(1)"><i class="bi bi-pencil"></i> 수정</button></td>
                <td><button class="btn-danger btn-sm" onclick="deleteMenu(1,'에그 베네딕트')"><i class="bi bi-trash3"></i> 삭제</button></td>
              </tr>
              <tr th:if="${menus == null}" id="menu-row-2" data-category="FOOD" data-id="2" data-name="아보카도 토스트">
                <td style="color:#9E8B7B;">2</td>
                <td><div class="img-preview" style="width:50px;height:42px;"><img src="/images/menu/default-food.svg" alt="아보카도 토스트" style="width:100%;height:100%;object-fit:cover;"></div></td>
                <td><span class="menu-name-cell">아보카도 토스트</span></td>
                <td><span class="badge badge-food">음식</span></td>
                <td style="font-weight:600;">13,500원</td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6B7A8D;">신선한 아보카도와 크림치즈를 올린 사워도우 토스트</td>
                <td><span class="badge menu-status-badge badge-available">판매중</span></td>
                <td>
                  <select class="status-select menu-availability-select" data-original-available="true">
                    <option value="true" selected>판매중</option>
                    <option value="false">품절</option>
                  </select>
                </td>
                <td><button class="btn-edit btn-sm" onclick="openMenuModal(2)"><i class="bi bi-pencil"></i> 수정</button></td>
                <td><button class="btn-danger btn-sm" onclick="deleteMenu(2,'아보카도 토스트')"><i class="bi bi-trash3"></i> 삭제</button></td>
              </tr>
              <tr th:if="${menus == null}" id="menu-row-7" data-category="DRINK" data-id="7" data-name="아메리카노">
                <td style="color:#9E8B7B;">7</td>
                <td><div class="img-preview" style="width:50px;height:42px;"><img src="/images/menu/default-drink.svg" alt="아메리카노" style="width:100%;height:100%;object-fit:cover;"></div></td>
                <td><span class="menu-name-cell" style="opacity:0.5">아메리카노</span></td>
                <td><span class="badge badge-drink">음료</span></td>
                <td style="font-weight:600;">5,000원</td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6B7A8D;">진하고 깔끔한 에스프레소 베이스 커피</td>
                <td><span class="badge menu-status-badge badge-soldout">품절</span></td>
                <td>
                  <select class="status-select menu-availability-select" data-original-available="false">
                    <option value="true">판매중</option>
                    <option value="false" selected>품절</option>
                  </select>
                </td>
                <td><button class="btn-edit btn-sm" onclick="openMenuModal(7)"><i class="bi bi-pencil"></i> 수정</button></td>
                <td><button class="btn-danger btn-sm" onclick="deleteMenu(7,'아메리카노')"><i class="bi bi-trash3"></i> 삭제</button></td>
              </tr>

            </tbody>
          </table>
        </div>

        <div class="pagination-wrap">
          <span th:text="${'총 ' + (menus != null ? #lists.size(menus) : '3') + '개 메뉴'}">총 3개 메뉴 (샘플)</span>
        </div>

      </div><!-- /data-card -->
    </div><!-- /page-content -->
  </div><!-- /admin-content -->
</div><!-- /admin-layout -->

<!-- ─── 메뉴 추가/수정 모달 ──────────────────────── -->
<div class="modal-overlay" id="menu-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="menu-modal-title">
        <i class="bi bi-plus-circle"></i> 메뉴 추가
      </div>
      <button class="modal-close" onclick="closeMenuModal()">✕</button>
    </div>

    <form class="modal-body" id="menu-form" onsubmit="submitMenuForm(event)">
      <input type="hidden" name="id" value="">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">메뉴명 *</label>
          <input type="text" class="form-control" name="name" placeholder="예: 에그 베네딕트" required maxlength="100">
        </div>
        <div class="form-group">
          <label class="form-label">가격 (원) *</label>
          <input type="number" class="form-control" name="price" placeholder="예: 16500" min="0" step="500" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">카테고리 *</label>
        <select class="form-control" name="category" required>
          <option value="">카테고리 선택</option>
          <option value="FOOD">음식 메뉴</option>
          <option value="DRINK">음료 메뉴</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">설명</label>
        <input type="text" class="form-control" name="description" placeholder="메뉴 설명을 입력하세요" maxlength="500">
      </div>

      <div class="form-group">
        <label class="form-label">이미지 URL</label>
        <input type="text" class="form-control" id="menu-image-url" name="imageUrl"
               placeholder="https://example.com/image.jpg"
               oninput="previewMenuImage()">
        <div class="img-preview" id="menu-img-preview">
          <img src="/images/menu/default-food.svg" alt="미리보기" style="width:100%;height:100%;object-fit:cover;">
        </div>
      </div>

      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="available" value="true" checked>
          <label>판매 활성화</label>
        </label>
      </div>
    </form>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeMenuModal()">취소</button>
      <button class="btn-primary" onclick="document.getElementById('menu-form').requestSubmit()">
        <i class="bi bi-check-lg"></i> 저장
      </button>
    </div>
  </div>
</div>

<script th:src="@{/js/admin.js}"></script>
<script>
  // 카테고리 필터
  function filterByCategory(category) {
    const rows = document.querySelectorAll('#menus-table tbody tr');
    rows.forEach(row => {
      const rowCat = row.dataset.category || '';
      row.style.display = (!category || rowCat === category) ? '' : 'none';
    });
  }
</script>
</body>
</html>
