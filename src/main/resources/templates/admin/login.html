<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 - 브런치 카페</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<!--
  [백엔드 연동]
  - Spring Security 폼 로그인: POST /admin/login (action)
  - SecurityConfig에서 loginPage("/admin/login"), loginProcessingUrl("/admin/login") 설정
  - 실패 시 ?error, 로그아웃 시 ?logout 파라미터 전달
-->

<div class="login-page">
  <div class="login-card">

    <!-- 로고 -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <img
                src="/images/logo.png"
                alt="브런치 카페 로고"
                width="64"
                height="64"
        />
      </div>
      <div class="login-logo-title">버터벨</div>
      <div class="login-logo-sub">관리자 로그인</div>
    </div>

    <!-- 오류 메시지 -->
    <div th:if="${param.error}" class="login-error">
      <i class="bi bi-exclamation-triangle-fill"></i>
      아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <!-- 로그아웃 메시지 -->
    <div th:if="${param.logout}"
         style="background:#F0FFF4; border:1px solid #86EFAC; border-radius:8px; padding:10px 14px; font-size:13px; color:#16A34A; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
      <i class="bi bi-check-circle-fill"></i>
      로그아웃되었습니다.
    </div>

    <!-- 로그인 폼 -->
    <form class="login-form" method="post" th:action="@{/admin/login}" action="/admin/login">

      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="관리자 아이디를 입력하세요" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
      </div>

      <!-- CSRF 토큰 (Spring Security) -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <button type="submit" class="btn-login">
        로그인
      </button>
    </form>

    <p style="margin-top:20px; font-size:12px; color:#9E8B7B; text-align:center;">
      <i class="bi bi-shield-lock"></i> 관리자 전용 페이지입니다.
    </p>
  </div>
</div>

<script>
  // 엔터키 폼 제출
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      document.querySelector('.login-form')?.submit();
    }
  });
</script>
</body>
</html>
