<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <!--
    ※ 이 head는 fragment 파일을 브라우저에서 직접 열었을 때만 적용됩니다.
       실제 페이지에서는 각 템플릿 파일의 <head>가 사용됩니다.
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공통 레이아웃 Fragment</title>
</head>

<!--
  ===================================================================
  파일명 : fragments/layout.html
  역할   : 여러 페이지에서 공통으로 사용하는 Thymeleaf Fragment 모음
  ===================================================================

  ▶ Fragment 목록
  ┌─────────────────┬──────────────────────────────────────────────┐
  │ Fragment 이름   │ 설명                                         │
  ├─────────────────┼──────────────────────────────────────────────┤
  │ kiosk-header    │ 키오스크 상단 헤더 (카페명 + 시계 + 회원로그인) │
  │ admin-sidebar   │ 관리자 페이지 왼쪽 사이드바 (메뉴 네비게이션)  │
  └─────────────────┴──────────────────────────────────────────────┘

  ▶ 사용 방법 (Thymeleaf th:replace)

    키오스크 헤더 삽입:
      <header th:replace="~{fragments/layout :: kiosk-header}"></header>

    관리자 사이드바 삽입:
      <aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>

  ▶ 현재 적용 페이지
    - kiosk-header  → kiosk/index.html, cart.html, payment.html,
                       complete.html, stamp.html
    - admin-sidebar → admin/dashboard.html, orders.html,
                       members.html, menus.html

  ▶ [백엔드 연동] admin-sidebar에서 사용하는 Model 변수
    - pendingCount : int  — 접수 대기 주문 수 (배지 표시, 0이면 숨김)
    - adminName    : String — 로그인한 관리자 이름 표시
      예시) model.addAttribute("pendingCount", orderService.countPending());
            model.addAttribute("adminName", adminService.getCurrentAdminName());
  ===================================================================
-->

<!-- ================================================================
     FRAGMENT 1: kiosk-header
     - 키오스크 모든 서브 페이지 상단에 공통으로 들어가는 헤더
     - 카페 브랜딩, 실시간 시계(JS), 회원 로그인 버튼 포함
     ================================================================ -->
<header th:fragment="kiosk-header" class="kiosk-header">
  <div class="cafe-branding">
    <div class="cafe-logo-circle">
      <img src="/images/logo.svg" alt="브런치 카페 로고" width="26" height="26">
    </div>
    <div class="cafe-name-block">
      <div class="name">브런치 카페</div>
      <div class="sub">BRUNCH CAFE KIOSK</div>
    </div>
  </div>
  <div class="header-right">
    <!-- 실시간 시계 — kiosk.js의 startClock()이 업데이트 -->
    <span class="header-time" id="header-clock">00:00</span>
    <!--
      [백엔드 연동] 회원 로그인 상태 분기 예시:
      <span th:if="${session.memberName != null}"
            class="btn-member-login" style="cursor:default;">
        <i class="bi bi-person-check-fill"></i>
        <span th:text="${session.memberName + ' 님'}">홍길동 님</span>
      </span>
      <a th:unless="${session.memberName != null}"
         th:href="@{/member/login}" class="btn-member-login">
        <i class="bi bi-person-circle"></i> 회원 로그인
      </a>
    -->
    <a th:href="@{/member/login}" href="/member/login" class="btn-member-login">
      <i class="bi bi-person-circle"></i>
      <span>회원 로그인</span>
    </a>
  </div>
</header>


<!-- ================================================================
     FRAGMENT 2: admin-sidebar
     - 관리자 모든 페이지 왼쪽에 공통으로 들어가는 사이드바
     - 네비게이션 메뉴, 로그인 사용자 정보, 로그아웃 버튼 포함
     - 현재 경로와 일치하는 메뉴는 admin.js의 highlightActiveNav()가 활성화
     ================================================================ -->
<aside th:fragment="admin-sidebar" class="admin-sidebar">

  <!-- 상단 브랜드 로고 -->
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">
      <img src="/images/logo.svg" alt="로고" width="22" height="22">
    </div>
    <div class="sidebar-brand-text">
      <div class="name">브런치 카페</div>
      <div class="sub">관리자 시스템</div>
    </div>
  </div>

  <!-- 네비게이션 메뉴 -->
  <nav class="sidebar-nav">

    <div class="nav-section-label">MAIN</div>
    <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="nav-item">
      <i class="bi bi-speedometer2"></i>
      <span>대시보드</span>
    </a>

    <div class="nav-section-label">MANAGE</div>

    <!-- 주문 관리: 대기 주문 수가 있으면 빨간 배지 표시 -->
    <a th:href="@{/admin/orders}" href="/admin/orders" class="nav-item">
      <i class="bi bi-receipt"></i>
      <span>주문 관리</span>
      <span class="nav-badge"
            th:if="${pendingCount != null and pendingCount > 0}"
            th:text="${pendingCount}">3</span>
    </a>

    <!-- 회원 관리 -->
    <a th:href="@{/admin/members}" href="/admin/members" class="nav-item">
      <i class="bi bi-people"></i>
      <span>회원 관리</span>
    </a>

    <!-- 메뉴 관리 -->
    <a th:href="@{/admin/menus}" href="/admin/menus" class="nav-item">
      <i class="bi bi-grid"></i>
      <span>메뉴 관리</span>
    </a>

  </nav>

  <!-- 하단 로그인 사용자 정보 + 로그아웃 -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">A</div>
      <div>
        <!--
          [백엔드 연동] Spring Security 사용자명 표시:
          <div class="sidebar-user-name"
               sec:authentication="name">admin</div>
          또는
          <div class="sidebar-user-name"
               th:text="${#authentication.name}">admin</div>
        -->
        <div class="sidebar-user-name"
             th:text="${adminName != null ? adminName : 'admin'}">admin</div>
        <div class="sidebar-user-role">관리자</div>
      </div>
    </div>

    <!--
      [백엔드 연동] Spring Security 로그아웃은 POST 방식 권장:
      <form th:action="@{/admin/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn-logout">로그아웃</button>
      </form>
    -->
    <a th:href="@{/admin/logout}" href="/admin/logout" class="btn-logout">
      <i class="bi bi-box-arrow-right"></i>
      <span>로그아웃</span>
    </a>
  </div>

</aside>

</html>
